<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音声メモ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{--bg:#f6f5f0;--sf:#fff;--sa:#f0efe8;--bd:#ddd9cc;--tx:#555;--tm:#999;--ac:#c05030;--as:#f4e8e4;--ah:#a8432a;--gn:#3a7d5c;--gs:#e4f0ea;--bl:#3868a0;--bs:#e4ecf4;--r:10px;--sh:0 1px 3px rgba(0,0,0,.06)}
  [data-theme=alt]{--bg:#e8e6e2;--sf:#f0eeea;--sa:#dddbd6;--bd:#c5c3be;--sh:0 1px 3px rgba(0,0,0,.08)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;line-height:1.7;transition:background .3s}
  .app{max-width:720px;margin:0 auto;padding:12px 16px 160px}

  .hd{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--bd);margin-bottom:14px}
  .hd h1{font-size:17px;font-weight:600;flex:1}
  .ib{width:32px;height:32px;border:1px solid var(--bd);border-radius:6px;background:var(--sf);color:var(--tm);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .ib:hover{background:var(--sa);color:var(--tx)}

  .on-bar{display:none;align-items:center;gap:8px;padding:7px 12px;background:#888;color:#fff;border-radius:var(--r);margin-bottom:10px;font-size:12px;font-weight:500}
  .on-bar.active{display:flex}
  .on-dot{width:7px;height:7px;border-radius:50%;background:#ff4444;animation:pd 2s ease-in-out infinite;flex-shrink:0}
  @keyframes pd{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,68,68,.4)}50%{opacity:.6;box-shadow:0 0 0 4px rgba(255,68,68,0)}}
  .on-bar .t{flex:1}.on-bar .tm{font-family:'JetBrains Mono',monospace;font-size:11px;opacity:.7}

  .toolbar{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
  .tb{padding:4px 10px;border:1px solid var(--bd);border-radius:14px;font-size:11px;color:var(--tm);cursor:pointer;background:var(--sf);font-family:inherit;transition:all .12s;white-space:nowrap}
  .tb:hover{background:var(--sa);color:var(--tx)}.tb.on{background:var(--ac);color:#fff;border-color:var(--ac)}
  .tb-info{font-size:10px;color:var(--tm);font-family:'JetBrains Mono',monospace;margin-left:auto}

  .wave-wrap{display:none;margin-bottom:10px;height:32px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
  .wave-wrap.show{display:block}
  canvas{width:100%;height:100%}

  .status{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;font-size:12px;box-shadow:var(--sh)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--tm);flex-shrink:0;transition:background .3s}
  .dot.on{background:var(--ac);animation:ps 1.2s ease-in-out infinite}.dot.ok{background:var(--gn)}
  @keyframes ps{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
  .stx{flex:1;color:var(--tm)}.badge{background:var(--as);color:var(--ac);font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;display:none}.badge.show{display:inline-block}

  .live{display:none;margin-bottom:10px}.live.show{display:block}
  .live-l{font-size:10px;font-weight:600;color:var(--ac);margin-bottom:2px;display:flex;align-items:center;gap:5px}
  .live-l .bk{width:5px;height:5px;border-radius:50%;background:var(--ac);animation:bk 1s infinite}
  @keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}
  .live-b{background:#fffaf5;border:2px solid #f0d8c0;border-radius:var(--r);padding:10px 12px;font-size:15px;line-height:1.8;min-height:42px;white-space:pre-wrap;word-break:break-all}
  .live-b .cur{display:inline-block;width:2px;height:1em;background:var(--ac);animation:cr .5s infinite;vertical-align:text-bottom;margin-left:1px}
  @keyframes cr{0%,100%{opacity:1}50%{opacity:0}}

  .search-row{display:none;margin-bottom:8px;gap:6px}.search-row.show{display:flex}
  .search-row input{flex:1;padding:7px 10px;border:1px solid var(--bd);border-radius:8px;font-family:inherit;font-size:12px;background:var(--sf);color:var(--tx)}
  .search-row input:focus{outline:none;border-color:var(--bl)}

  .segs{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .seg{position:relative;background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;padding-right:90px;font-size:13px;line-height:1.8;box-shadow:var(--sh);animation:si .15s ease-out;min-height:38px;white-space:pre-wrap;word-break:break-all;cursor:grab}
  .seg.starred{border-left:3px solid #f0c040}
  .seg-text{outline:none;cursor:text;display:block}
  .seg-meta{position:absolute;top:6px;right:6px;display:flex;align-items:center;gap:1px}
  .seg-time{font-size:9px;color:var(--tm);font-family:'JetBrains Mono',monospace;margin-right:3px;opacity:.5}
  .sb{width:22px;height:22px;border:none;background:transparent;color:var(--tm);font-size:11px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s}
  .seg:hover .sb{opacity:.6}.sb:hover{opacity:1!important;background:var(--sa)}.sb.del:hover{background:var(--as);color:var(--ac)}
  .sb.star{opacity:.3}.seg.starred .sb.star{opacity:1;color:#f0c040}
  @keyframes si{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  .empty{text-align:center;padding:30px 20px;color:var(--tm);font-size:12px;line-height:2}
  .result{display:none;margin-bottom:12px}.result.show{display:block}
  .result-l{font-size:11px;font-weight:600;color:var(--tm);margin-bottom:4px}
  .result-b{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-all;box-shadow:var(--sh);max-height:140px;overflow-y:auto}

  .panel{display:none;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:10px;box-shadow:var(--sh)}.panel.show{display:block}
  .panel h3{font-size:12px;font-weight:600;margin-bottom:8px}
  .p-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
  .p-row label{font-size:11px;color:var(--tm);display:flex;align-items:center;gap:4px;cursor:pointer}
  .p-row select{font-family:inherit;font-size:11px;padding:3px 6px;border:1px solid var(--bd);border-radius:5px;background:var(--sf);color:var(--tx)}
  .p-row input[type=checkbox]{accent-color:var(--ac);width:14px;height:14px}
  .p-hint{font-size:10px;color:var(--tm);opacity:.6;margin-bottom:6px}
  .p-sep{height:1px;background:var(--bd);margin:8px 0}
  .dict-area textarea{width:100%;height:60px;font-family:'JetBrains Mono',monospace;font-size:11px;border:1px solid var(--bd);border-radius:6px;padding:6px;background:var(--sf);color:var(--tx);resize:vertical}

  .hist{max-height:200px;overflow-y:auto}
  .hi{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--bd);border-radius:6px;margin-bottom:4px;font-size:12px;cursor:pointer;transition:background .12s}
  .hi:hover{background:var(--sa)}

  .undo-bar{display:none;align-items:center;justify-content:space-between;padding:6px 12px;background:#fdf8e8;border:1px solid #e0b020;border-radius:var(--r);margin-bottom:8px;font-size:12px}
  .undo-bar.show{display:flex}

  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;align-items:center;justify-content:center}
  .modal-bg.show{display:flex}
  .modal{background:var(--sf);border-radius:12px;padding:20px;max-width:400px;width:90%}
  .modal h3{font-size:15px;margin-bottom:12px}
  .mo{padding:10px 14px;border:1px solid var(--bd);border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:13px;transition:background .12s}
  .mo:hover{background:var(--sa)}.mo small{display:block;font-size:11px;color:var(--tm);margin-top:2px}

  .bar{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);padding:8px 16px;box-shadow:0 -4px 16px rgba(0,0,0,.06);z-index:100}
  .bar-in{max-width:720px;margin:0 auto;display:flex;gap:5px;align-items:center}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:9px 13px;border:1px solid var(--bd);border-radius:8px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;background:var(--sf);color:var(--tx);transition:all .12s;white-space:nowrap}
  .btn:hover{background:var(--sa)}.btn:active{transform:scale(.97)}
  .b1{background:var(--ac);color:#fff;border-color:var(--ac);flex:1;max-width:160px}.b1:hover{background:var(--ah)}.b1.on{background:#888;border-color:#888}
  .bc{background:var(--gn);color:#fff;border-color:var(--gn)}.bc:hover{background:#327050}.bc.ok{background:var(--gs);color:var(--gn);border-color:var(--gn)}
  .bd{color:var(--tm);border-color:transparent;padding:9px 8px}.bd:hover{color:var(--ac);background:var(--as)}
  .btn:disabled{opacity:.3;cursor:not-allowed}.sp{flex:1}

  .toast{position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-50px);background:#888;color:#fff;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:500;z-index:200;opacity:0;transition:all .25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .err{background:var(--as);border:1px solid var(--ac);border-radius:var(--r);padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--ac);display:none;line-height:1.7}.err.show{display:block}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <h1>🎙 音声メモ</h1>
    <button class="ib" onclick="toggleSearch()">🔍</button>
    <button class="ib" onclick="togglePanel('hist')">📚</button>
    <button class="ib" onclick="togglePanel('filter')">⚙</button>
    <button class="ib" id="themeBtn" onclick="toggleTheme()">🎨</button>
  </div>
  <div class="err" id="err"></div>
  <div class="on-bar" id="onBar"><div class="on-dot"></div><span class="t">常時待機中</span><span class="tm" id="ut">00:00:00</span></div>

  <div class="toolbar">
    <button class="tb" onclick="togglePanel('format')">📝 出力</button>
    <button class="tb" id="tbStar" onclick="toggleStarFilter()">⭐ スター</button>
    <span class="tb-info"><span id="stS">0</span>件·<span id="stC">0</span>字·除外<span id="stK">0</span>·補正<span id="stF">0</span></span>
  </div>

  <div class="wave-wrap" id="waveWrap"><canvas id="cv"></canvas></div>

  <!-- Filter panel -->
  <div class="panel" id="panelFilter">
    <h3>フィルター</h3>
    <div class="p-row">
      <label>最小文字数：<select id="minLen"><option value="1">1</option><option value="2" selected>2</option><option value="4">4</option></select></label>
      <label><input type="checkbox" id="filterFiller" checked> 相槌除外</label>
      <label><input type="checkbox" id="dedupe" checked> 重複除去</label>
    </div>
    <div class="p-row">
      <label><input type="checkbox" id="autoPunct" checked> 自動句読点</label>
      <label><input type="checkbox" id="useDict" checked> 辞書補正</label>
      <label><input type="checkbox" id="notifSound" checked> 通知音</label>
    </div>
    <div class="p-sep"></div>
    <h3>カスタム辞書（誤→正、1行1組）</h3>
    <div class="dict-area"><textarea id="customDict" placeholder="肝心→関心&#10;加盟→科目"></textarea></div>
    <div class="p-hint">よく誤認識される語を登録すると自動置換します</div>
  </div>

  <!-- Format panel -->
  <div class="panel" id="panelFormat">
    <div class="p-row">
      <label>区切り：<select id="sep"><option value="\n">改行</option><option value="。">。</option><option value=" ">スペース</option><option value="\n\n">空行</option></select></label>
      <label>結合：<select id="mergeMode"><option value="5" selected>5秒</option><option value="3">3秒</option><option value="0">なし</option></select></label>
      <label><input type="checkbox" id="showTs" checked> 時刻</label>
    </div>
  </div>

  <!-- History panel -->
  <div class="panel" id="panelHist">
    <h3>過去のセッション</h3>
    <div class="hist" id="histList"></div>
    <div class="p-sep"></div>
    <button class="tb" onclick="saveSession()" style="width:100%;text-align:center;padding:8px">💾 現在のメモを保存</button>
  </div>

  <div class="search-row" id="searchRow"><input type="text" id="searchInput" placeholder="検索…" oninput="doSearch()"><button style="border:none;background:none;cursor:pointer;font-size:14px;color:var(--tm)" onclick="toggleSearch()">✕</button></div>

  <div class="status"><div class="dot" id="dot"></div><span class="stx" id="stx">マイクボタンで開始</span><span class="badge" id="bdg">0</span></div>

  <div class="live" id="live"><div class="live-l"><span class="bk"></span> 聴き取り中</div><div class="live-b" id="liveBox"><span class="cur"></span></div></div>

  <div class="undo-bar" id="undoBar"><span>🗑 削除しました</span><button style="padding:3px 10px;border:1px solid #c0a020;border-radius:5px;background:var(--sf);font-size:11px;cursor:pointer;font-family:inherit;color:#8a6d00" onclick="doUndo()">元に戻す</button></div>

  <div class="segs" id="segs"><div class="empty">🎤 常時待機ON → 話す → コピー → Claudeへ</div></div>

  <div class="result" id="res"><div class="result-l">プレビュー</div><div class="result-b" id="resB"></div></div>
</div>

<!-- Copy modal -->
<div class="modal-bg" id="cpModal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal"><h3>📋 コピー形式</h3>
    <div class="mo" onclick="cpFmt('plain')">📝 テキストのみ</div>
    <div class="mo" onclick="cpFmt('ts')">🕐 時刻つき</div>
    <div class="mo" onclick="cpFmt('num')">🔢 番号つき</div>
    <div class="mo" onclick="cpFmt('starred')">⭐ スターのみ</div>
    <button class="btn" style="margin-top:8px" onclick="$('cpModal').classList.remove('show')">閉じる</button>
  </div>
</div>

<!-- Save modal -->
<div class="modal-bg" id="saveModal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal"><h3>💾 保存形式</h3>
    <div class="mo" onclick="exportTxt()">📄 テキスト (.txt)</div>
    <div class="mo" onclick="exportDoc()">📝 Word (.doc)<small>表形式で保存</small></div>
    <button class="btn" style="margin-top:8px" onclick="$('saveModal').classList.remove('show')">閉じる</button>
  </div>
</div>

<div class="bar"><div class="bar-in">
  <button class="btn b1" id="mic" onclick="toggle()">🎤 ON</button>
  <div class="sp"></div>
  <button class="btn bc" id="cpb" onclick="$('cpModal').classList.add('show')" disabled>📋 コピー</button>
  <button class="btn bd" id="dlb" onclick="$('saveModal').classList.add('show')" disabled>💾</button>
  <button class="btn bd" id="clb" onclick="clAll()" disabled>🗑</button>
</div></div>
<div class="toast" id="tst"></div>

<script>
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const $=id=>document.getElementById(id);
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(m){$('tst').textContent=m;$('tst').classList.add('show');setTimeout(()=>$('tst').classList.remove('show'),1600)}

if(!SR){$('err').textContent='⚠ Chrome/Edge で開いてください';$('err').classList.add('show');$('mic').disabled=true}

// ===== STATE =====
let segs=[],on=false,rec=null,micStream=null,t0=null,utI=null;
let pendingInterim='',lastSegTime=0,skipCount=0,fixCount=0,lastFinalText='';
let audioCtx=null,analyser=null,dataArr=null,volAnimId=null;
let waveHist=new Array(200).fill(0),waveIdx=0,cvCtx=null;
let undoStack=[],searchQuery='',starFilter=false;

// ===== SETTINGS SAVE/LOAD =====
const SETTING_KEYS=['minLen','filterFiller','dedupe','autoPunct','useDict','notifSound','sep','mergeMode','showTs','customDict'];
function saveSettings(){
  const s={};
  SETTING_KEYS.forEach(k=>{
    const el=$(k);if(!el)return;
    if(el.type==='checkbox')s[k]=el.checked;
    else s[k]=el.value;
  });
  localStorage.setItem('vm_settings',JSON.stringify(s));
}
function loadSettings(){
  try{
    const d=localStorage.getItem('vm_settings');if(!d)return;
    const s=JSON.parse(d);
    SETTING_KEYS.forEach(k=>{
      const el=$(k);if(!el||s[k]===undefined)return;
      if(el.type==='checkbox')el.checked=s[k];
      else el.value=s[k];
    });
  }catch(e){}
}
// Auto-save on any setting change
document.addEventListener('change',e=>{if(SETTING_KEYS.includes(e.target.id))saveSettings()});
document.addEventListener('input',e=>{if(e.target.id==='customDict')saveSettings()});

// ===== SEGMENTS SAVE/LOAD =====
function saveSegs(){try{localStorage.setItem('vm_segs',JSON.stringify(segs))}catch(e){}}
function loadSegs(){
  try{
    const d=localStorage.getItem('vm_segs');if(!d)return;
    segs=JSON.parse(d);
    if(segs.length&&typeof segs[0]==='string')segs=segs.map(s=>({text:s,time:'',starred:false}));
    render();updRes();updStats();
  }catch(e){}
}

// ===== THEME =====
function toggleTheme(){
  const d=document.documentElement;
  const is=d.getAttribute('data-theme')==='alt';
  d.setAttribute('data-theme',is?'':'alt');
  localStorage.setItem('vm_theme',is?'':'alt');
}
(function(){const t=localStorage.getItem('vm_theme');if(t)document.documentElement.setAttribute('data-theme',t)})();

// ===== DICTIONARY =====
const BUILTIN_DICT=[
  ['資金是と','資金前渡'],['前渡し','前渡'],['消耗日','消耗品'],['消極品','消耗品'],
  ['請求署','請求書'],['指名書','仕様書'],['権利者','管理者'],['完了届け','完了届'],
  ['委託量','委託料'],['系薬','契約'],['契約所','契約書'],['不利替え','振替'],
  ['振り替え','振替'],['加盟','科目'],['仮名','科名'],['肝心','関心'],
];
function getCustomDict(){
  const t=$('customDict').value.trim();if(!t)return[];
  return t.split('\n').map(l=>{const p=l.split(/[→=>]/);return p.length>=2?[p[0].trim(),p[1].trim()]:null}).filter(Boolean);
}
function applyDict(text){
  if(!$('useDict').checked)return text;
  let t=text,fixed=false;
  [...BUILTIN_DICT,...getCustomDict()].forEach(([f,r])=>{if(t.includes(f)){t=t.replaceAll(f,r);fixed=true}});
  if(fixed){fixCount++;updStats()}
  return t;
}

// ===== POST-PROCESSING =====
function autoPunct(t){
  if(!$('autoPunct').checked)return t;
  t=t.replace(/([^。、！？!?\s])$/,'$1。');
  t=t.replace(/(ですが|けど|ので|から|のに|ますが|ですけど)([^\s、。])/g,'$1、$2');
  t=t.replace(/。。+/g,'。').replace(/、、+/g,'、').replace(/、。/g,'。');
  return t;
}
function cleanText(t){return t.replace(/(.{2,8})\1{2,}/g,'$1').replace(/\s+/g,' ').trim()}
function postProcess(t){return autoPunct(cleanText(applyDict(t)))}

// ===== FILLERS =====
const FILLERS=new Set('はい,うん,ええ,ああ,ふん,へえ,なるほど,そう,そうですね,はいはい,うんうん,えっと,あの,えー,あー,まあ,んー,了解,はいはいはい,お疲れ様です,失礼します,どうも,すみません,おはようございます,よろしくお願いします,ありがとうございます,かしこまりました,どうぞ,お願いします'.split(','));

function shouldKeep(t){
  const clean=t.replace(/[。、.,!！?？\s・]/g,'');
  if(clean.length<(parseInt($('minLen').value)||1)){skipCount++;updStats();return false}
  if(FILLERS.has(clean)&&$('filterFiller').checked){skipCount++;updStats();return false}
  if($('dedupe').checked&&segs.length>0&&clean===segs[segs.length-1].text.replace(/[。、.,!！?？\s・]/g,'')){skipCount++;updStats();return false}
  return true;
}

// ===== NOTIFICATION =====
function playNotif(){
  if(!$('notifSound').checked)return;
  try{const a=new AudioContext();const o=a.createOscillator(),g=a.createGain();o.frequency.value=1200;g.gain.value=0.03;o.connect(g);g.connect(a.destination);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.15);o.start();o.stop(a.currentTime+0.15);setTimeout(()=>a.close(),200)}catch(e){}
}

// ===== VOLUME / WAVEFORM =====
function startVol(stream){
  try{
    audioCtx=new AudioContext();
    analyser=audioCtx.createAnalyser();analyser.fftSize=256;analyser.smoothingTimeConstant=0.8;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    dataArr=new Uint8Array(analyser.frequencyBinCount);
    const c=$('cv');cvCtx=c.getContext('2d');c.width=c.offsetWidth*2;c.height=64;
    monVol();$('waveWrap').classList.add('show');
  }catch(e){}
}
function monVol(){
  if(!on){$('waveWrap').classList.remove('show');return}
  analyser.getByteFrequencyData(dataArr);
  let s=0;for(let i=0;i<dataArr.length;i++)s+=dataArr[i];
  const v=Math.min(100,Math.round(s/dataArr.length/1.28));
  waveHist[waveIdx%200]=v;waveIdx++;
  // Draw
  if(cvCtx){
    const w=$('cv').width,h=$('cv').height;cvCtx.clearRect(0,0,w,h);const bw=w/200;
    for(let i=0;i<200;i++){const idx=(waveIdx+i)%200;const val=waveHist[idx]/100*h;
    cvCtx.fillStyle=waveHist[idx]>15?'#c05030':'#ddd9cc';cvCtx.fillRect(i*bw,h-val,bw-1,val)}
  }
  volAnimId=requestAnimationFrame(monVol);
}
function stopVol(){cancelAnimationFrame(volAnimId);if(audioCtx)try{audioCtx.close()}catch(e){};audioCtx=null;$('waveWrap').classList.remove('show')}

// ===== MIC =====
async function acquireMic(){
  if(micStream)return true;
  try{micStream=await navigator.mediaDevices.getUserMedia({audio:true});return true}
  catch(e){$('err').innerHTML='⚠ マイク許可が必要です';$('err').classList.add('show');return false}
}
function releaseMic(){if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null}}

// ===== LIVE =====
function updLive(t){
  const b=$('liveBox');
  if(t){b.innerHTML=esc(t)+'<span class="cur"></span>';$('live').classList.add('show')}
  else b.innerHTML='<span class="cur"></span>';
}

// ===== ADD TEXT =====
function addText(raw){
  const t=postProcess(raw);
  if(!t||!shouldKeep(t))return;
  const now=Date.now();const ms=parseInt($('mergeMode').value)||0;
  const ts=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  if(ms>0&&segs.length>0&&(now-lastSegTime)<ms*1000){
    segs[segs.length-1].text+=t;
  }else{
    segs.push({text:t,time:ts,starred:false});
  }
  lastSegTime=now;lastFinalText=t;
  render();updRes();updStats();saveSegs();playNotif();toast('✓ #'+segs.length);
}

// ===== RECOGNITION =====
function makeRec(){
  if(rec)return;if(!SR)return;
  rec=new SR();rec.lang='ja-JP';rec.continuous=true;rec.interimResults=true;

  rec.onstart=()=>{$('dot').className='dot on';$('stx').textContent='聴き取り中…';$('err').classList.remove('show');$('live').classList.add('show')};

  rec.onresult=(e)=>{
    let interim='',finalT='';
    for(let j=e.resultIndex;j<e.results.length;j++){
      if(e.results[j].isFinal)finalT+=e.results[j][0].transcript;
      else interim+=e.results[j][0].transcript;
    }
    if(finalT){addText(finalT.trim());pendingInterim='';if(!interim)updLive('')}
    if(interim){pendingInterim=interim;updLive($('useDict').checked?applyDict(interim):interim)}
  };

  rec.onerror=(e)=>{if(e.error==='not-allowed'){$('err').innerHTML='⚠ マイク許可が必要';$('err').classList.add('show')}};

  rec.onend=()=>{
    if(pendingInterim.trim()){addText(pendingInterim.trim());pendingInterim=''}
    updLive('');
    if(!on){$('live').classList.remove('show');return}
    setTimeout(()=>{if(!on)return;try{rec.start()}catch(e){rec=null;makeRec();try{rec.start()}catch(e2){}}},300);
  };
}

// ===== TOGGLE =====
async function toggle(){
  if(on){
    on=false;clearInterval(utI);try{rec.abort()}catch(e){}rec=null;stopVol();releaseMic();pendingInterim='';
    $('mic').innerHTML='🎤 ON';$('mic').classList.remove('on');$('onBar').classList.remove('active');$('live').classList.remove('show');
    $('dot').className=segs.length?'dot ok':'dot';$('stx').textContent=segs.length?segs.length+'件':'マイクボタンで開始';
  }else{
    const ok=await acquireMic();if(!ok)return;
    on=true;t0=Date.now();pendingInterim='';skipCount=0;fixCount=0;lastFinalText='';updStats();
    $('mic').innerHTML='⏹ 停止';$('mic').classList.add('on');$('onBar').classList.add('active');
    clearInterval(utI);utI=setInterval(uptime,1000);uptime();
    startVol(micStream);makeRec();try{rec.start()}catch(e){}
  }
}
function uptime(){if(!t0)return;const s=Math.floor((Date.now()-t0)/1000);$('ut').textContent=String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor((s%3600)/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

// ===== SEGMENTS =====
function rmSeg(i){undoStack.push({i,seg:{...segs[i]}});segs.splice(i,1);render();updRes();updStats();saveSegs();$('undoBar').classList.add('show');setTimeout(()=>$('undoBar').classList.remove('show'),5000)}
function doUndo(){if(!undoStack.length)return;const u=undoStack.pop();segs.splice(u.i,0,u.seg);render();updRes();updStats();saveSegs();$('undoBar').classList.remove('show');toast('↩ 戻しました')}
function updSeg(i,t){segs[i].text=t;updRes();saveSegs()}
function cpSeg(i){navigator.clipboard.writeText(segs[i].text).then(()=>toast('📋 #'+(i+1))).catch(()=>{})}
function toggleStar(i){segs[i].starred=!segs[i].starred;render();saveSegs()}
function toggleStarFilter(){starFilter=!starFilter;$('tbStar').classList.toggle('on',starFilter);render()}

let dragIdx=null;
function render(){
  const el=$('segs');el.innerHTML='';
  let list=segs.map((s,i)=>({...s,i}));
  if(starFilter)list=list.filter(s=>s.starred);
  if(searchQuery)list=list.filter(s=>s.text.includes(searchQuery));
  if(!list.length&&!segs.length){
    el.innerHTML='<div class="empty">🎤 常時待機ON → 話す → コピー → Claudeへ</div>';
    $('res').classList.remove('show');$('cpb').disabled=true;$('dlb').disabled=true;$('clb').disabled=true;$('bdg').classList.remove('show');return;
  }
  if(!list.length){el.innerHTML='<div class="empty">該当なし</div>';return}
  const showT=$('showTs').checked;
  list.forEach(s=>{
    const i=s.i,d=document.createElement('div');
    d.className='seg'+(s.starred?' starred':'');
    d.draggable=true;
    d.ondragstart=e=>{dragIdx=i;d.style.opacity='.5';e.dataTransfer.effectAllowed='move'};
    d.ondragend=()=>{d.style.opacity='';document.querySelectorAll('.seg').forEach(x=>x.style.borderTop='')};
    d.ondragover=e=>{e.preventDefault();document.querySelectorAll('.seg').forEach(x=>x.style.borderTop='');d.style.borderTop='2px solid var(--ac)'};
    d.ondrop=e=>{e.preventDefault();d.style.borderTop='';if(dragIdx===null||dragIdx===i)return;const item=segs.splice(dragIdx,1)[0];segs.splice(i,0,item);dragIdx=null;render();updRes();saveSegs()};

    const span=document.createElement('span');span.className='seg-text';span.contentEditable='true';span.textContent=s.text;
    span.onblur=()=>{const nt=span.textContent.trim();if(nt!==segs[i].text)updSeg(i,nt)};
    d.appendChild(span);

    const m=document.createElement('div');m.className='seg-meta';
    if(showT&&s.time){const tm=document.createElement('span');tm.className='seg-time';tm.textContent=s.time;m.appendChild(tm)}
    [[' star','⭐',()=>toggleStar(i)],['','📋',()=>cpSeg(i)],[' del','✕',()=>rmSeg(i)]].forEach(([c,t,f])=>{
      const b=document.createElement('button');b.className='sb'+c;b.textContent=t;b.onclick=e=>{e.stopPropagation();f()};m.appendChild(b)});
    d.appendChild(m);el.appendChild(d);
  });
  $('cpb').disabled=false;$('dlb').disabled=false;$('clb').disabled=false;
  $('bdg').textContent=segs.length;$('bdg').classList.add('show');
  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

function updStats(){$('stS').textContent=segs.length;$('stC').textContent=segs.reduce((a,s)=>a+s.text.length,0);$('stK').textContent=skipCount;$('stF').textContent=fixCount}

// ===== SEARCH =====
function toggleSearch(){const r=$('searchRow');r.classList.toggle('show');if(r.classList.contains('show'))$('searchInput').focus();else{$('searchInput').value='';searchQuery='';render()}}
function doSearch(){searchQuery=$('searchInput').value.trim();render()}

// ===== PANELS =====
function togglePanel(n){const map={filter:'panelFilter',format:'panelFormat',hist:'panelHist'};const p=$(map[n]);if(!p)return;const was=p.classList.contains('show');document.querySelectorAll('.panel').forEach(x=>x.classList.remove('show'));if(!was)p.classList.add('show')}

// ===== COPY =====
function getSep(){return $('sep').value.replace(/\\n/g,'\n')}
function updRes(){if(!segs.length){$('res').classList.remove('show');return}$('res').classList.add('show');$('resB').textContent=segs.map(s=>s.text).join(getSep())}
$('sep').addEventListener('change',updRes);

function cpFmt(fmt){
  let t='';const sp=getSep();
  if(fmt==='plain')t=segs.map(s=>s.text).join(sp);
  else if(fmt==='ts')t=segs.map(s=>'['+s.time+'] '+s.text).join('\n');
  else if(fmt==='num')t=segs.map((s,i)=>(i+1)+'. '+s.text).join('\n');
  else if(fmt==='starred')t=segs.filter(s=>s.starred).map(s=>s.text).join(sp);
  if(!t){toast('対象なし');return}
  navigator.clipboard.writeText(t).then(()=>{$('cpModal').classList.remove('show');toast('📋 コピーしました');$('cpb').innerHTML='✅';$('cpb').classList.add('ok');setTimeout(()=>{$('cpb').innerHTML='📋 コピー';$('cpb').classList.remove('ok')},1500)}).catch(()=>{});
}

// ===== EXPORT =====
function exportTxt(){
  if(!segs.length)return;$('saveModal').classList.remove('show');
  const now=new Date();const fn='音声メモ_'+now.toISOString().slice(0,10)+'.txt';
  const body=segs.map(s=>'['+s.time+'] '+(s.starred?'⭐ ':'')+s.text).join('\n');
  dl('# 音声メモ '+now.toLocaleString('ja-JP')+'\n\n'+body,'text/plain;charset=utf-8',fn);toast('💾 保存');
}
function exportDoc(){
  if(!segs.length)return;$('saveModal').classList.remove('show');
  const now=new Date();const fn='音声メモ_'+now.toISOString().slice(0,10)+'.doc';
  const rows=segs.map((s,i)=>'<tr><td style="padding:6px 10px;border:1px solid #ccc;text-align:center;font-size:11px;color:#888;width:30px">'+(i+1)+'</td><td style="padding:6px 10px;border:1px solid #ccc;font-size:11px;color:#888;width:70px">'+(s.time||'')+'</td><td style="padding:6px 10px;border:1px solid #ccc;font-size:13px">'+(s.starred?'⭐ ':'')+esc(s.text)+'</td></tr>').join('');
  const html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"><style>body{font-family:sans-serif;margin:40px}h1{font-size:18px;color:#555}table{border-collapse:collapse;width:100%}th{padding:8px;border:1px solid #999;background:#f0f0f0;font-size:12px;text-align:left}</style></head><body><h1>🎙 音声メモ</h1><p style="font-size:12px;color:#888">'+now.toLocaleString('ja-JP')+' — '+segs.length+'件</p><table><tr><th>No.</th><th>時刻</th><th>内容</th></tr>'+rows+'</table></body></html>';
  dl('\ufeff'+html,'application/msword;charset=utf-8',fn);toast('💾 Word保存');
}
function dl(content,type,fn){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=fn;a.click();URL.revokeObjectURL(a.href)}

function clAll(){if(segs.length&&!confirm('すべて消去しますか？'))return;segs=[];undoStack=[];render();updRes();updStats();saveSegs();toast('🗑 クリア')}

// ===== SESSIONS =====
function saveSession(){if(!segs.length){toast('メモなし');return}const ss=JSON.parse(localStorage.getItem('vm_sessions')||'[]');ss.unshift({date:new Date().toLocaleString('ja-JP'),segs:[...segs],count:segs.length,preview:segs[0].text.slice(0,30)});if(ss.length>20)ss.length=20;localStorage.setItem('vm_sessions',JSON.stringify(ss));renderHist();toast('💾 保存')}
function loadSession(i){const ss=JSON.parse(localStorage.getItem('vm_sessions')||'[]');if(!ss[i])return;if(segs.length&&!confirm('上書きしますか？'))return;segs=[...ss[i].segs];render();updRes();updStats();saveSegs();document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));toast('📂 読込')}
function delSession(i,ev){ev.stopPropagation();const ss=JSON.parse(localStorage.getItem('vm_sessions')||'[]');ss.splice(i,1);localStorage.setItem('vm_sessions',JSON.stringify(ss));renderHist()}
function renderHist(){const ss=JSON.parse(localStorage.getItem('vm_sessions')||'[]');$('histList').innerHTML=ss.length?ss.map((s,i)=>'<div class="hi" onclick="loadSession('+i+')"><span style="font-family:monospace;font-size:10px;color:var(--tm)">'+s.date+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(s.preview)+'</span><span style="font-size:10px;color:var(--tm)">'+s.count+'件</span><button style="opacity:0;font-size:12px;background:none;border:none;cursor:pointer;color:var(--tm)" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0" onclick="delSession('+i+',event)">✕</button></div>').join(''):'<div style="color:var(--tm);font-size:12px;padding:8px">まだなし</div>'}

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&e.ctrlKey){e.preventDefault();toggle()}
  if(e.code==='KeyF'&&e.ctrlKey){e.preventDefault();toggleSearch()}
});
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&on){try{rec.abort()}catch(e){}}});

// ===== INIT =====
loadSettings();
loadSegs();
renderHist();
</script>
</body>
</html>
