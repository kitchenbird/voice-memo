<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音声メモ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{--bg:#f6f5f0;--sf:#fff;--sa:#f0efe8;--bd:#ddd9cc;--tx:#555;--tm:#999;--ac:#c05030;--as:#f4e8e4;--ah:#a8432a;--gn:#3a7d5c;--gs:#e4f0ea;--bl:#3868a0;--bs:#e4ecf4;--r:10px;--sh:0 1px 3px rgba(0,0,0,.06)}
  [data-theme=dark]{--bg:#e8e6e2;--sf:#f0eeea;--sa:#dddbd6;--bd:#c5c3be;--tx:#555;--tm:#999;--ac:#c05030;--as:#f0ddd5;--ah:#a8432a;--gn:#3a7d5c;--gs:#ddeee4;--bl:#3868a0;--bs:#dde6f0;--sh:0 1px 3px rgba(0,0,0,.08)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;line-height:1.7;transition:background .3s,color .3s}
  .app{max-width:720px;margin:0 auto;padding:12px 16px 160px}
  .hd{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--bd);margin-bottom:14px}
  .hd h1{font-size:17px;font-weight:600;flex:1}
  .icon-btn{width:32px;height:32px;border:1px solid var(--bd);border-radius:6px;background:var(--sf);color:var(--tm);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .icon-btn:hover{background:var(--sa);color:var(--tx)}
  .icon-btn.active{background:var(--ac);color:#fff;border-color:var(--ac)}
  .toolbar{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
  .tb-btn{padding:4px 10px;border:1px solid var(--bd);border-radius:14px;font-size:11px;color:var(--tm);cursor:pointer;background:var(--sf);font-family:inherit;transition:all .12s;white-space:nowrap}
  .tb-btn:hover{background:var(--sa);color:var(--tx)}
  .tb-btn.on{background:var(--ac);color:#fff;border-color:var(--ac)}
  .tb-sep{width:1px;height:16px;background:var(--bd);margin:0 4px}
  .tb-info{font-size:10px;color:var(--tm);font-family:'JetBrains Mono',monospace;margin-left:auto}
  .on-bar{display:none;align-items:center;gap:8px;padding:7px 12px;background:#888;color:#fff;border-radius:var(--r);margin-bottom:10px;font-size:12px;font-weight:500}
  .on-bar.active{display:flex}
  .on-dot{width:7px;height:7px;border-radius:50%;background:#ff4444;animation:pd 2s ease-in-out infinite;flex-shrink:0}
  @keyframes pd{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,68,68,.4)}50%{opacity:.6;box-shadow:0 0 0 4px rgba(255,68,68,0)}}
  .on-bar .t{flex:1}.on-bar .tm{font-family:'JetBrains Mono',monospace;font-size:11px;opacity:.7}
  .wave-wrap{display:none;margin-bottom:10px;height:32px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;overflow:hidden;position:relative}
  .wave-wrap.show{display:block}
  .wave-canvas{width:100%;height:100%}
  .wave-th{position:absolute;top:0;height:100%;width:1px;background:var(--ac);opacity:.6;transition:left .2s}
  .status{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;font-size:12px;box-shadow:var(--sh)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--tm);flex-shrink:0;transition:background .3s}
  .dot.on{background:var(--ac);animation:ps 1.2s ease-in-out infinite}.dot.ok{background:var(--gn)}.dot.mt{background:#e8a020}
  @keyframes ps{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
  .stx{flex:1;color:var(--tm)}.badge{background:var(--as);color:var(--ac);font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;display:none}.badge.show{display:inline-block}
  .live{display:none;margin-bottom:10px}.live.show{display:block}
  .live-l{font-size:10px;font-weight:600;color:var(--ac);margin-bottom:2px;display:flex;align-items:center;gap:5px}
  .live-l .bk{width:5px;height:5px;border-radius:50%;background:var(--ac);animation:bk 1s ease-in-out infinite}
  @keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}
  .live-b{background:color-mix(in srgb,var(--ac) 5%,var(--sf));border:2px solid color-mix(in srgb,var(--ac) 20%,var(--bd));border-radius:var(--r);padding:10px 12px;font-size:15px;line-height:1.8;min-height:42px;white-space:pre-wrap;word-break:break-all}
  .live-b .cur{display:inline-block;width:2px;height:1em;background:var(--ac);animation:cr .5s ease-in-out infinite;vertical-align:text-bottom;margin-left:1px}
  @keyframes cr{0%,100%{opacity:1}50%{opacity:0}}
  .live-b .dim{opacity:.35}
  .search-row{display:none;margin-bottom:8px;gap:6px}.search-row.show{display:flex}
  .search-row input{flex:1;padding:7px 10px;border:1px solid var(--bd);border-radius:8px;font-family:inherit;font-size:12px;background:var(--sf);color:var(--tx)}
  .search-row input:focus{outline:none;border-color:var(--bl)}
  .search-row .sc{padding:6px;border:none;background:transparent;color:var(--tm);cursor:pointer;font-size:14px}
  .segs{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .seg{position:relative;background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;padding-right:90px;font-size:13px;line-height:1.8;box-shadow:var(--sh);animation:si .15s ease-out;min-height:38px;white-space:pre-wrap;word-break:break-all;transition:border-color .15s;cursor:grab}
  .seg.hl{border-color:var(--bl)}.seg.starred{border-left:3px solid #f0c040}.seg.dragging{opacity:.5}.seg.drag-over{border-top:2px solid var(--ac)}
  .seg-text{outline:none;cursor:text;display:block}.seg-text:focus{color:var(--bl)}
  .seg-meta{position:absolute;top:6px;right:6px;display:flex;align-items:center;gap:1px}
  .seg-time{font-size:9px;color:var(--tm);font-family:'JetBrains Mono',monospace;margin-right:3px;opacity:.5}
  .seg-btn{width:22px;height:22px;border:none;background:transparent;color:var(--tm);font-size:11px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s}
  .seg:hover .seg-btn{opacity:.6}.seg-btn:hover{opacity:1!important;background:var(--sa)}.seg-btn.del:hover{background:var(--as);color:var(--ac)}
  .seg-btn.star{opacity:.3}.seg.starred .seg-btn.star{opacity:1;color:#f0c040}
  @keyframes si{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .empty{text-align:center;padding:30px 20px;color:var(--tm);font-size:12px;line-height:2}
  .empty .ic{font-size:24px;margin-bottom:4px;opacity:.3}
  .result{display:none;margin-bottom:12px}.result.show{display:block}
  .result-l{font-size:11px;font-weight:600;color:var(--tm);margin-bottom:4px}
  .result-b{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-all;box-shadow:var(--sh);max-height:140px;overflow-y:auto}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:center;justify-content:center}
  .modal-bg.show{display:flex}
  .modal{background:var(--sf);border-radius:12px;padding:20px;max-width:400px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.15)}
  .modal h3{font-size:15px;margin-bottom:12px}
  .modal-opt{padding:10px 14px;border:1px solid var(--bd);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .12s;font-size:13px}
  .modal-opt:hover{background:var(--sa);border-color:var(--bl)}
  .modal-opt small{display:block;font-size:11px;color:var(--tm);margin-top:2px}
  .modal-close{padding:8px 16px;border:1px solid var(--bd);border-radius:8px;background:var(--sf);color:var(--tm);font-size:12px;cursor:pointer;margin-top:8px;font-family:inherit}
  .panel{display:none;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:10px;box-shadow:var(--sh)}.panel.show{display:block}
  .panel h3{font-size:12px;font-weight:600;margin-bottom:8px}
  .p-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
  .p-row label{font-size:11px;color:var(--tm);display:flex;align-items:center;gap:4px;cursor:pointer}
  .p-row select{font-family:inherit;font-size:11px;padding:3px 6px;border:1px solid var(--bd);border-radius:5px;background:var(--sf);color:var(--tx)}
  .p-row input[type=range]{width:90px}.p-row input[type=checkbox]{accent-color:var(--ac);width:14px;height:14px}
  .p-hint{font-size:10px;color:var(--tm);opacity:.6;margin-bottom:6px}
  .p-sep{height:1px;background:var(--bd);margin:8px 0}
  .preset-row{display:flex;gap:4px;margin-bottom:8px}
  .preset-btn{padding:5px 10px;border:1px solid var(--bd);border-radius:6px;font-size:11px;cursor:pointer;background:var(--sf);color:var(--tx);font-family:inherit;transition:all .12s;flex:1;text-align:center}
  .preset-btn:hover{background:var(--sa)}.preset-btn.sel{background:var(--ac);color:#fff;border-color:var(--ac)}
  .dict-area{margin-top:8px}
  .dict-area textarea{width:100%;height:60px;font-family:'JetBrains Mono',monospace;font-size:11px;border:1px solid var(--bd);border-radius:6px;padding:6px;background:var(--sf);color:var(--tx);resize:vertical}
  .hist{max-height:200px;overflow-y:auto}
  .hist-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--bd);border-radius:6px;margin-bottom:4px;font-size:12px;cursor:pointer;transition:background .12s}
  .hist-item:hover{background:var(--sa)}
  .hist-item .hi-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tm)}
  .hist-item .hi-text{flex:1;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hist-item .hi-cnt{font-size:10px;color:var(--tm)}
  .hist-item .hi-del{opacity:0;font-size:12px;color:var(--tm);background:none;border:none;cursor:pointer}
  .hist-item:hover .hi-del{opacity:.6}
  .undo-bar{display:none;align-items:center;justify-content:space-between;padding:6px 12px;background:color-mix(in srgb,#f0c040 15%,var(--sf));border:1px solid #e0b020;border-radius:var(--r);margin-bottom:8px;font-size:12px}
  .undo-bar.show{display:flex}
  .undo-btn{padding:3px 10px;border:1px solid #c0a020;border-radius:5px;background:var(--sf);font-size:11px;cursor:pointer;font-family:inherit;color:#8a6d00}
  .bar{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);padding:8px 16px;box-shadow:0 -4px 16px rgba(0,0,0,.06);z-index:100;transition:background .3s}
  .bar-in{max-width:720px;margin:0 auto;display:flex;gap:5px;align-items:center}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:9px 13px;border:1px solid var(--bd);border-radius:8px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;background:var(--sf);color:var(--tx);transition:all .12s;white-space:nowrap}
  .btn:hover{background:var(--sa)}.btn:active{transform:scale(.97)}
  .btn1{background:var(--ac);color:#fff;border-color:var(--ac);flex:1;max-width:160px}.btn1:hover{background:var(--ah)}.btn1.on{background:#888;border-color:#888}
  .btnc{background:var(--gn);color:#fff;border-color:var(--gn)}.btnc:hover{background:#327050}.btnc.ok{background:var(--gs);color:var(--gn);border-color:var(--gn)}
  .btnd{color:var(--tm);border-color:transparent;padding:9px 8px}.btnd:hover{color:var(--ac);background:var(--as)}
  .btn:disabled{opacity:.3;cursor:not-allowed}.sp{flex:1}
  .toast{position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-50px);background:#888;color:#fff;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:500;z-index:200;opacity:0;transition:all .25s ease;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .err{background:var(--as);border:1px solid var(--ac);border-radius:var(--r);padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--ac);display:none;line-height:1.7}.err.show{display:block}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <h1>🎙 音声メモ</h1>
    <button class="icon-btn" onclick="toggleSearch()" title="検索">🔍</button>
    <button class="icon-btn" onclick="togglePanel('hist')" title="履歴">📚</button>
    <button class="icon-btn" onclick="togglePanel('filter')" title="フィルター">⚙</button>
    <button class="icon-btn" id="darkBtn" onclick="toggleDark()" title="配色切替">🌙</button>
  </div>
  <div class="err" id="err"></div>
  <div class="on-bar" id="onBar"><div class="on-dot"></div><span class="t">常時待機中</span><span class="tm" id="ut">00:00:00</span></div>
  <div class="toolbar">
    <button class="tb-btn" onclick="togglePanel('format')">📝 出力</button>
    <button class="tb-btn" id="tbStar" onclick="toggleStarFilter()">⭐ スター</button>
    <div class="tb-sep"></div>
    <span class="tb-info"><span id="stSegs">0</span>件·<span id="stChars">0</span>字·除外<span id="stSkip">0</span>·補正<span id="stFix">0</span></span>
  </div>
  <div class="wave-wrap" id="waveWrap"><canvas class="wave-canvas" id="waveCanvas"></canvas><div class="wave-th" id="waveTh" style="left:15%"></div></div>

  <!-- Panels -->
  <div class="panel" id="panelFilter">
    <h3>環境プリセット</h3>
    <div class="preset-row">
      <button class="preset-btn" onclick="applyPreset('quiet')" id="preQ">🤫 静か</button>
      <button class="preset-btn sel" onclick="applyPreset('normal')" id="preN">🏢 通常</button>
      <button class="preset-btn" onclick="applyPreset('noisy')" id="preX">🗣 にぎやか</button>
    </div>
    <div class="p-sep"></div>
    <div class="p-row"><label>音量しきい値：<input type="range" id="volTh" min="0" max="60" value="15" oninput="updTh()"><span id="thVal">15</span></label></div>
    <div class="p-row">
      <label>最小文字数：<select id="minLen"><option value="1">1</option><option value="2" selected>2</option><option value="4">4</option><option value="6">6</option></select></label>
      <label>信頼度：<select id="minConf"><option value="0" selected>なし</option><option value="0.3">低</option><option value="0.5">中</option><option value="0.7">高</option></select></label>
    </div>
    <div class="p-row">
      <label><input type="checkbox" id="filterFiller" checked> 相槌除外</label>
      <label><input type="checkbox" id="autoPunct" checked> 自動句読点</label>
      <label><input type="checkbox" id="dedupe" checked> 重複除去</label>
    </div>
    <div class="p-row">
      <label><input type="checkbox" id="useDict" checked> 誤認識補正</label>
      <label><input type="checkbox" id="useAudioFilter" checked> 音声フィルター</label>
      <label><input type="checkbox" id="notifSound" checked> 通知音</label>
    </div>
    <div class="p-sep"></div>
    <h3>カスタム辞書（誤→正、1行1組）</h3>
    <div class="dict-area"><textarea id="customDict" placeholder="肝心→関心&#10;加盟→科目&#10;茶道→差動"></textarea></div>
    <div class="p-hint">よく誤認識される語を登録すると自動で置換します</div>
  </div>

  <div class="panel" id="panelFormat">
    <div class="p-row">
      <label>区切り：<select id="sep"><option value="\n">改行</option><option value="。">。</option><option value=" ">スペース</option><option value="\n\n">空行</option></select></label>
      <label>結合：<select id="mergeMode"><option value="5" selected>5秒</option><option value="3">3秒</option><option value="0">なし</option></select></label>
      <label><input type="checkbox" id="showTs" checked> 時刻</label>
    </div>
  </div>

  <div class="panel" id="panelHist">
    <h3>過去のセッション</h3>
    <div class="hist" id="histList"></div>
    <div class="p-sep"></div>
    <button class="tb-btn" onclick="saveSession()" style="width:100%;text-align:center;padding:8px">💾 セッション保存</button>
  </div>

  <div class="search-row" id="searchRow"><input type="text" id="searchInput" placeholder="検索…" oninput="doSearch()"><button class="sc" onclick="toggleSearch()">✕</button></div>
  <div class="status"><div class="dot" id="dot"></div><span class="stx" id="stx">マイクボタンで開始</span><span class="badge" id="bdg">0</span></div>
  <div class="live" id="live"><div class="live-l"><span class="bk"></span> 聴き取り中</div><div class="live-b" id="liveBox"><span class="cur"></span></div></div>
  <div class="undo-bar" id="undoBar"><span>🗑 削除しました</span><button class="undo-btn" onclick="undo()">元に戻す</button></div>
  <div class="segs" id="segs"><div class="empty"><div class="ic">🎤</div>常時待機ON → 話す → コピー → Claudeへ</div></div>
  <div class="result" id="res"><div class="result-l">プレビュー</div><div class="result-b" id="resB"></div></div>
</div>

<div class="modal-bg" id="cpModal">
  <div class="modal">
    <h3>📋 コピー形式</h3>
    <div class="modal-opt" onclick="cpFmt('plain')">📝 テキストのみ</div>
    <div class="modal-opt" onclick="cpFmt('ts')">🕐 時刻つき</div>
    <div class="modal-opt" onclick="cpFmt('num')">🔢 番号つき</div>
    <div class="modal-opt" onclick="cpFmt('starred')">⭐ スターのみ</div>
    <button class="modal-close" onclick="$('cpModal').classList.remove('show')">閉じる</button>
  </div>
</div>

<div class="modal-bg" id="saveModal">
  <div class="modal">
    <h3>💾 保存形式</h3>
    <div class="modal-opt" onclick="exportTxt()">📄 テキスト (.txt)<small>軽量・どこでも開ける</small></div>
    <div class="modal-opt" onclick="exportDoc()">📝 Word (.doc)<small>時刻・スター付きの表形式で保存</small></div>
    <button class="modal-close" onclick="$('saveModal').classList.remove('show')">閉じる</button>
  </div>
</div>

<div class="bar"><div class="bar-in">
  <button class="btn btn1" id="mic" onclick="toggle()">🎤 ON</button>
  <div class="sp"></div>
  <button class="btn btnc" id="cpb" onclick="showCpModal()" disabled>📋 コピー</button>
  <button class="btn btnd" id="dlb" onclick="showSaveModal()" disabled>💾</button>
  <button class="btn btnd" id="clb" onclick="clAll()" disabled>🗑</button>
</div></div>
<div class="toast" id="tst"></div>

<script>
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let segs=[],on=false,rec=null,micStream=null,t0=null,utI=null;
let pendingInterim='',lastSegTime=0,skipCount=0,fixCount=0,lastFinalText='';
let audioCtx=null,analyser=null,dataArr=null,volAnimId=null,currentVol=0,lastLoudTime=0;
let undoStack=[],searchQuery='',starFilter=false;
let waveHistory=new Array(200).fill(0),waveIdx=0,waveCanvas,waveCtx;
// Audio filter nodes
let audioFilterChain=null;

const $=id=>document.getElementById(id);
if(!SR){$('err').textContent='⚠ Chrome/Edge で開いてください';$('err').classList.add('show');$('mic').disabled=true}

// =========================================================
//  POST-PROCESSING PIPELINE
// =========================================================

// --- 1. Built-in misrecognition dictionary ---
const BUILTIN_DICT=[
  // 業務・経理用語
  ['肝心','関心'],['加盟','科目'],['仮名','科名'],['資金是と','資金前渡'],
  ['前渡し','前渡'],['母さん','ゴム'],['けいりー','経理'],['せんたー','センター'],
  ['はっちゅう','発注'],['検収書','検収書'],['納品書','納品書'],
  ['支出付','支出負担'],['しゅっとう','出頭'],['出頭命令','出頭命令'],
  ['消耗日','消耗品'],['請求署','請求書'],['指名書','仕様書'],
  ['権利者','管理者'],['完了届け','完了届'],['委託量','委託料'],
  ['一般廃棄物','一般廃棄物'],['系薬','契約'],['契約所','契約書'],
  ['会計管理局','会計管理局'],['予算執行','予算執行'],
  ['不利替え','振替'],['振り替え','振替'],['執行場所','執行場所'],
  ['消極品','消耗品'],['少額契約','少額契約'],
  // 一般的な誤認識
  ['行って','言って'],['いって','言って'],
  ['化石','菓子'],['過去','課後'],
  ['きんしん','近親'],
  // 数字関連
  ['１万','1万'],['２万','2万'],['３万','3万'],
];

// --- 2. Custom dictionary parser ---
function getCustomDict(){
  const txt=$('customDict').value.trim();
  if(!txt)return[];
  return txt.split('\n').map(line=>{
    const parts=line.split(/[→=>]/);
    if(parts.length>=2)return[parts[0].trim(),parts[1].trim()];
    return null;
  }).filter(Boolean);
}

// --- 3. Apply dictionary ---
function applyDict(text){
  if(!$('useDict').checked)return text;
  let t=text,fixed=false;
  const allDict=[...BUILTIN_DICT,...getCustomDict()];
  for(const[from,to]of allDict){
    if(t.includes(from)){
      t=t.replaceAll(from,to);
      fixed=true;
    }
  }
  if(fixed){fixCount++;updStats()}
  return t;
}

// --- 4. Auto punctuation (improved) ---
function autoPunct(t){
  if(!$('autoPunct').checked)return t;
  // Add 。 at end if missing
  t=t.replace(/([^。、！？!?\s])$/,'$1。');
  // Add 、 after conjunctive forms
  t=t.replace(/(ですが|けど|けれど|ので|から|のに|ながら|ますが|ですけど|だけど|したら|すると|ところ|ために|として|について|に対して|において)([^\s、。])/g,'$1、$2');
  // Remove double punctuation
  t=t.replace(/。。+/g,'。').replace(/、、+/g,'、').replace(/、。/g,'。');
  return t;
}

// --- 5. Text cleanup ---
function cleanupText(t){
  // Remove repeated phrases (e.g. "ですです" → "です")
  t=t.replace(/(.{2,8})\1{1,}/g,'$1');
  // Fix common spacing issues
  t=t.replace(/\s+/g,' ').trim();
  // Normalize certain characters
  t=t.replace(/～/g,'〜');
  return t;
}

// --- 6. Duplicate detection (improved) ---
function isDupe(t){
  if(!$('dedupe').checked)return false;
  const clean=t.replace(/[。、\s]/g,'');
  if(lastFinalText&&clean===lastFinalText.replace(/[。、\s]/g,''))return true;
  if(segs.length>0){
    const last=segs[segs.length-1].text.replace(/[。、\s]/g,'');
    // Exact or near-exact match
    if(last===clean)return true;
    // Suffix overlap (recognition repeated)
    if(clean.length>4&&last.endsWith(clean))return true;
    if(clean.length>4&&clean.endsWith(last)&&Math.abs(last.length-clean.length)<3)return true;
  }
  return false;
}

// --- 7. Full pipeline ---
function postProcess(text){
  let t=text;
  t=applyDict(t);     // Dictionary correction
  t=cleanupText(t);    // Remove repeats, normalize
  t=autoPunct(t);      // Add punctuation
  return t;
}

// --- 8. Select best from multiple alternatives ---
function selectBest(results,resultIndex){
  let bestText='',bestConf=0;
  for(let j=resultIndex;j<results.length;j++){
    if(!results[j].isFinal)continue;
    // Check all alternatives
    for(let k=0;k<results[j].length;k++){
      const alt=results[j][k];
      let score=alt.confidence;
      const text=alt.transcript.trim();
      // Bonus for longer text (more context = usually better)
      score+=Math.min(text.length*0.002,0.05);
      // Bonus if text contains known dictionary terms
      const allDict=[...BUILTIN_DICT,...getCustomDict()];
      for(const[,correct]of allDict){
        if(text.includes(correct))score+=0.03;
      }
      // Penalty for very short fragments
      if(text.length<3)score-=0.1;
      if(score>bestConf){bestConf=score;bestText=text}
    }
  }
  return{text:bestText,confidence:bestConf};
}

// =========================================================
//  AUDIO PREPROCESSING
// =========================================================
function createAudioFilter(stream){
  if(!$('useAudioFilter').checked)return stream;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const src=ctx.createMediaStreamSource(stream);

    // High-pass filter: cut below 80Hz (rumble, AC hum)
    const hp=ctx.createBiquadFilter();
    hp.type='highpass';hp.frequency.value=80;hp.Q.value=0.7;

    // Low-pass filter: cut above 8000Hz (hiss, electronic noise)
    const lp=ctx.createBiquadFilter();
    lp.type='lowpass';lp.frequency.value=8000;lp.Q.value=0.7;

    // Compressor: normalize volume (boost quiet, limit loud)
    const comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-30;comp.knee.value=20;
    comp.ratio.value=4;comp.attack.value=0.003;comp.release.value=0.25;

    // Notch filter: reduce 50Hz/60Hz power line hum
    const notch=ctx.createBiquadFilter();
    notch.type='notch';notch.frequency.value=50;notch.Q.value=10;

    // Chain: src → hp → notch → lp → comp → destination
    src.connect(hp);hp.connect(notch);notch.connect(lp);lp.connect(comp);

    // Create output stream from filtered audio
    const dest=ctx.createMediaStreamDestination();
    comp.connect(dest);

    audioFilterChain={ctx,dest};
    return dest.stream;
  }catch(e){
    console.warn('Audio filter failed:',e);
    return stream;
  }
}

// =========================================================
//  DIRECT COMMIT — post-process and add immediately
// =========================================================
function addProcessed(text,confidence){
  const t=text.trim();
  if(!t)return;
  const processed=postProcess(t);
  if(processed&&shouldKeep(processed,confidence)){
    addText(processed);
  }
}

const FILLERS=new Set('はい,うん,ええ,ああ,おう,ふん,へえ,ほう,なるほど,そう,そうですね,そうですか,はいはい,うんうん,ええと,えっと,あの,えー,あー,まあ,ふーん,んー,おー,わかりました,了解,はいはいはい,失礼します,お疲れ様です,どうも,すみません,おはようございます,お疲れ様,ですね,かな,よろしくお願いします,ありがとうございます,そうそう,そうだね,ですよね,うーん,はいはいはいはい,ですよ,かしこまりました,どうぞ,あのー,お願いします,それで'.split(','));

function shouldKeep(text,conf){
  const t=text.trim();
  const clean=t.replace(/[。、.,!！?？\s・]/g,'');
  // Only filter: empty / too short
  if(clean.length<(parseInt($('minLen').value)||1)){skipCount++;updStats();return false}
  // Only filter: exact filler match
  if(FILLERS.has(clean)&&$('filterFiller').checked){skipCount++;updStats();return false}
  // Only filter: exact duplicate of the last segment
  if($('dedupe').checked&&segs.length>0){
    const lastClean=segs[segs.length-1].text.replace(/[。、.,!！?？\s・]/g,'');
    if(clean===lastClean){skipCount++;updStats();return false}
  }
  // Volume gate and confidence are now visual-only (wave display) — never block text
  return true;
}

function playNotif(){

}
function startVol(stream){
  try{
    const vCtx=new(window.AudioContext||window.webkitAudioContext)();
    const src=vCtx.createMediaStreamSource(stream);
    analyser=vCtx.createAnalyser();analyser.fftSize=256;analyser.smoothingTimeConstant=0.8;
    src.connect(analyser);dataArr=new Uint8Array(analyser.frequencyBinCount);

    waveCanvas.width=waveCanvas.offsetWidth*2;waveCanvas.height=64;
    monVol();$('waveWrap').classList.add('show');

}
function monVol(){
  if(!on){$('waveWrap').classList.remove('show');return}
  analyser.getByteFrequencyData(dataArr);
  let s=0;for(let i=0;i<dataArr.length;i++)s+=dataArr[i];
  currentVol=Math.min(100,Math.round(s/dataArr.length/1.28));
  const th=parseInt($('volTh').value)||0;
  const loud=currentVol>=th;if(loud)lastLoudTime=Date.now();
  waveHistory[waveIdx%200]=currentVol;waveIdx++;drawWave(th);
  if(on&&!loud&&th>0){$('dot').className='dot mt';$('stx').textContent='待機中（音量不足）'}
  else if(on){$('dot').className='dot on';$('stx').textContent='聴き取り中…'}

}
function drawWave(th){
  if(!waveCtx)return;const w=waveCanvas.width,h=waveCanvas.height;
  const dk=document.documentElement.getAttribute('data-theme')==='dark';
  waveCtx.clearRect(0,0,w,h);const bw=w/200;

  waveCtx.fillStyle=waveHistory[idx]>=th?(dk?'#c05030':'#c05030'):(dk?'#c5c3be':'#ddd9cc');
  waveCtx.fillRect(i*bw,h-v,bw-1,v)}
}

// =========================================================
//  RECOGNITION — enhanced
// =========================================================
function makeRec(){
  if(rec)return;if(!SR)return;
  rec=new SR();rec.lang='ja-JP';rec.continuous=true;rec.interimResults=true;

  rec.onstart=()=>{$('dot').className='dot on';$('stx').textContent='聴き取り中…';$('err').classList.remove('show');$('live').classList.add('show')};

  rec.onresult=(e)=>{
    let interim='',finalT='',finalC=1;

    for(let j=e.resultIndex;j<e.results.length;j++){
      const t=e.results[j][0].transcript;
      const c=e.results[j][0].confidence;
      if(e.results[j].isFinal){finalT+=t;finalC=c}
      else interim+=t;
    }

    if(finalT){
      const tr=finalT.trim();
      if(tr)addProcessed(tr,finalC);
      pendingInterim='';
      if(!interim)updLive('');
    }

    if(interim){
      pendingInterim=interim;
      let preview=interim;
      if($('useDict').checked)preview=applyDict(preview);
      updLive(preview,false);
    }
  };

  rec.onerror=(e)=>{if(e.error==='not-allowed'){$('err').innerHTML='⚠ マイク許可が必要';$('err').classList.add('show')}};

  rec.onend=()=>{
    // Always save any pending interim — never lose recognized text
    if(pendingInterim.trim()){
      addProcessed(pendingInterim.trim(),1);
      pendingInterim='';
    }
    updLive('');
    if(!on){$('live').classList.remove('show');return}
    setTimeout(()=>{if(!on)return;try{rec.start()}catch(e){rec=null;makeRec();try{rec.start()}catch(e2){}}},300);
  };
}

  }else{
    const ok=await acquireMic();if(!ok)return;
    on=true;t0=Date.now();pendingInterim='';skipCount=0;fixCount=0;lastLoudTime=Date.now();lastFinalText='';updStats();

}

<div class="sub">${dateStr} ${timeStr}　—　${segs.length}件　${segs.reduce((a,s)=>a+s.text.length,0)}文字</div>
<table>

}
}
function clAll(){if(segs.length&&!confirm('すべて消去しますか？'))return;segs=[];undoStack=[];render();updRes();updStats();saveSegs();toast('🗑 クリア')}
function toast(m){$('tst').textContent=m;$('tst').classList.add('show');setTimeout(()=>$('tst').classList.remove('show'),1600)}

// Sessions
function saveSession(){if(!segs.length){toast('メモなし');return}const ss=JSON.parse(localStorage.getItem('vm_sessions')||'[]');ss.unshift({date:new Date().toLocaleString('ja-JP'),segs:[...segs],count:segs.length,preview:segs[0].text.slice(0,30)});if(ss.length>20)ss.length=20;localStorage.setItem('vm_sessions',JSON.stringify(ss));renderHist();toast('💾 保存')}
function loadSession(i){const ss=JSON.parse(localStorage.getItem('vm_sessions')||'[]');if(!ss[i])return;if(segs.length&&!confirm('上書きしますか？'))return;segs=[...ss[i].segs];render();updRes();updStats();saveSegs();document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));toast('📂 読込')}
function delSession(i,e){e.stopPropagation();const ss=JSON.parse(localStorage.getItem('vm_sessions')||'[]');ss.splice(i,1);localStorage.setItem('vm_sessions',JSON.stringify(ss));renderHist()}
function renderHist(){const ss=JSON.parse(localStorage.getItem('vm_sessions')||'[]');const el=$('histList');if(!ss.length){el.innerHTML='<div style="color:var(--tm);font-size:12px;padding:8px">まだなし</div>';return}el.innerHTML=ss.map((s,i)=>`<div class="hist-item" onclick="loadSession(${i})"><span class="hi-date">${s.date}</span><span class="hi-text">${esc(s.preview)}</span><span class="hi-cnt">${s.count}件</span><button class="hi-del" onclick="delSession(${i},event)">✕</button></div>`).join('')}
renderHist();

// Keyboard
document.addEventListener('keydown',e=>{if(e.code==='Space'&&e.ctrlKey){e.preventDefault();toggle()}if(e.code==='KeyF'&&e.ctrlKey){e.preventDefault();toggleSearch()}});
$('cpModal').addEventListener('click',e=>{if(e.target===$('cpModal'))$('cpModal').classList.remove('show')});
$('saveModal').addEventListener('click',e=>{if(e.target===$('saveModal'))$('saveModal').classList.remove('show')});
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&on){try{rec.abort()}catch(e){}}});
